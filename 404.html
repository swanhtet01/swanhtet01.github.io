<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Redirecting to SUPERMEGA.dev</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(196, 164, 132, 0.18), transparent 28%),
          radial-gradient(circle at bottom left, rgba(110, 153, 141, 0.22), transparent 34%),
          #0b1110;
        color: #edf2ec;
        font-family: Manrope, "Segoe UI", sans-serif;
      }

      main {
        width: min(540px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background: rgba(9, 17, 16, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      .eyebrow {
        margin: 0 0 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 12px;
        color: #7bc4b0;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 44px);
        line-height: 1.05;
      }

      p {
        margin: 14px 0 0;
        color: rgba(237, 242, 236, 0.78);
        line-height: 1.6;
      }

      a {
        color: #f0c18c;
        font-weight: 700;
      }
    </style>
    <script>
      const target = `https://www.supermega.dev${window.location.pathname}${window.location.search}${window.location.hash}`
      window.location.replace(target)
    </script>
  </head>
  <body>
    <main>
      <p class="eyebrow">SUPERMEGA.dev</p>
      <h1>Redirecting to the live workspace.</h1>
      <p>This route is handled on <a href="https://www.supermega.dev">www.supermega.dev</a>. Redirecting now.</p>
    </main>
  </body>
</html>
