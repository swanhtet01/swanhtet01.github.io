<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperMega Business Card</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        background: #0a1220;
        color: white;
      }
      .sheet {
        max-width: 1100px;
        margin: 0 auto;
      }
      .header {
        margin-bottom: 20px;
      }
      .header h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      .header p {
        margin: 0;
        color: #9db1c7;
      }
      .cards {
        display: grid;
        gap: 28px;
      }
      .card-wrap {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        padding: 18px;
      }
      .card-wrap h2 {
        margin: 0 0 12px;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #25d0ff;
      }
      .card {
        width: 3.5in;
        height: 2in;
        display: block;
        border-radius: 12px;
        box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      }
      .note {
        margin-top: 20px;
        color: #9db1c7;
        font-size: 14px;
      }
      @media print {
        body {
          background: white;
          color: black;
          padding: 0.25in;
        }
        .sheet {
          max-width: none;
        }
        .card-wrap {
          break-inside: avoid;
          page-break-inside: avoid;
          border: none;
          background: none;
          padding: 0 0 0.3in;
        }
        .card-wrap h2,
        .note,
        .header p {
          color: black;
        }
      }
    </style>
  </head>
  <body>
    <div class="sheet">
      <div class="header">
        <h1>SuperMega business card</h1>
        <p>Print front and back at 3.5 x 2 inches.</p>
      </div>
      <div class="cards">
        <section class="card-wrap">
          <h2>Front</h2>
          <img alt="SuperMega business card front" class="card" src="/brand/business-card-front.svg" />
        </section>
        <section class="card-wrap">
          <h2>Back</h2>
          <img alt="SuperMega business card back" class="card" src="/brand/business-card-back.svg" />
        </section>
      </div>
      <p class="note">Contact: swanhtet@supermega.dev | Website: supermega.dev</p>
    </div>
  </body>
</html>
