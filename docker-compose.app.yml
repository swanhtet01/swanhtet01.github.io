services:
  supermega-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supermega-app
    ports:
      - "8787:8080"
    environment:
      SUPERMEGA_PILOT_DATA: /app/data/pilot-data
      SUPERMEGA_CORS_ORIGINS: http://localhost:8787
      SUPERMEGA_AUTH_REQUIRED: "1"
      SUPERMEGA_APP_USERNAME: owner
      SUPERMEGA_APP_PASSWORD: supermega-demo
      SUPERMEGA_APP_DISPLAY_NAME: Owner
      SUPERMEGA_APP_ROLE: owner
    volumes:
      - supermega-app-data:/app/data
    restart: unless-stopped

  supermega-supervisor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supermega-supervisor
    command:
      - python
      - -m
      - mark1_pilot.supervisor
      - --config
      - /app/config.example.json
      - --repo-root
      - /app
      - --interval-minutes
      - "60"
      - --max-cycles
      - "0"
    environment:
      SUPERMEGA_PILOT_DATA: /app/data/pilot-data
    volumes:
      - supermega-app-data:/app/data
    restart: unless-stopped

volumes:
  supermega-app-data:
