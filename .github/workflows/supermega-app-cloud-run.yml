name: Deploy SuperMega App To Cloud Run

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Google Cloud project ID
        required: true
        default: supermega-468612
      region:
        description: Cloud Run region
        required: true
        default: asia-southeast1
      service:
        description: Cloud Run service name
        required: true
        default: supermega-app

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ github.event.inputs.project_id }}
      REGION: ${{ github.event.inputs.region }}
      SERVICE: ${{ github.event.inputs.service }}
      IMAGE: asia-southeast1-docker.pkg.dev/${{ github.event.inputs.project_id }}/cloud-run-source-deploy/${{ github.event.inputs.service }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set active project
        run: gcloud config set project "$PROJECT_ID"

      - name: Configure Docker auth
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" \
            --build-arg VITE_BOOKING_URL="${{ vars.VITE_BOOKING_URL }}" \
            --build-arg VITE_WORKSPACE_APP_BASE="${{ vars.VITE_WORKSPACE_APP_BASE }}" \
            --build-arg VITE_WORKSPACE_API_BASE="${{ vars.VITE_WORKSPACE_API_BASE }}" \
            -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy Cloud Run app
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "SUPERMEGA_SITE_ROOT=/app/showroom/dist,SUPERMEGA_PILOT_DATA=/app/pilot-data,SUPERMEGA_AUTH_REQUIRED=1,SUPERMEGA_APP_USERNAME=${{ secrets.SUPERMEGA_APP_USERNAME }},SUPERMEGA_APP_PASSWORD=${{ secrets.SUPERMEGA_APP_PASSWORD }},SUPERMEGA_APP_DISPLAY_NAME=${{ vars.SUPERMEGA_APP_DISPLAY_NAME }},SUPERMEGA_APP_ROLE=${{ vars.SUPERMEGA_APP_ROLE }},SUPERMEGA_WORKSPACE_SLUG=${{ vars.SUPERMEGA_WORKSPACE_SLUG }},SUPERMEGA_WORKSPACE_NAME=${{ vars.SUPERMEGA_WORKSPACE_NAME }},SUPERMEGA_WORKSPACE_PLAN=${{ vars.SUPERMEGA_WORKSPACE_PLAN }},SUPERMEGA_SESSION_HOURS=${{ vars.SUPERMEGA_SESSION_HOURS }},SUPERMEGA_DATABASE_URL=${{ secrets.SUPERMEGA_DATABASE_URL }},SUPERMEGA_CORS_ORIGINS=${{ vars.SUPERMEGA_CORS_ORIGINS }},VITE_BOOKING_URL=${{ vars.VITE_BOOKING_URL }},VITE_WORKSPACE_APP_BASE=${{ vars.VITE_WORKSPACE_APP_BASE }},VITE_WORKSPACE_API_BASE=${{ vars.VITE_WORKSPACE_API_BASE }}"

      - name: Print service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format='value(status.url)'
