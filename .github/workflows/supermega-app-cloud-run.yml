name: Deploy SuperMega App To Cloud Run

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Google Cloud project ID
        required: true
        default: supermega-468612
      region:
        description: Cloud Run region
        required: true
        default: asia-southeast1
      service:
        description: Cloud Run service name
        required: true
        default: supermega-app

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ github.event.inputs.project_id }}
      REGION: ${{ github.event.inputs.region }}
      SERVICE: ${{ github.event.inputs.service }}
      IMAGE: asia-southeast1-docker.pkg.dev/${{ github.event.inputs.project_id }}/cloud-run-source-deploy/${{ github.event.inputs.service }}:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set active project
        run: gcloud config set project "$PROJECT_ID"

      - name: Configure Docker auth
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build and push image
        run: gcloud builds submit --tag "$IMAGE" .

      - name: Deploy Cloud Run app
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars "SUPERMEGA_SITE_ROOT=/app/showroom/dist,SUPERMEGA_PILOT_DATA=/app/pilot-data"

      - name: Print service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format='value(status.url)'
