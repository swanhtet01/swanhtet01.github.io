name: Deploy SuperMega App To Cloud Run

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: Google Cloud project ID
        required: true
        default: supermega-468612
      region:
        description: Cloud Run region
        required: true
        default: asia-southeast1
      service:
        description: Cloud Run service name
        required: true
        default: supermega-app

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ github.event.inputs.project_id }}
      REGION: ${{ github.event.inputs.region }}
      SERVICE: ${{ github.event.inputs.service }}
      ARTIFACT_REPOSITORY: supermega-containers
      IMAGE: asia-southeast1-docker.pkg.dev/${{ github.event.inputs.project_id }}/supermega-containers/${{ github.event.inputs.service }}:${{ github.sha }}
      CLOUDSQL_INSTANCE: ${{ vars.SUPERMEGA_CLOUDSQL_INSTANCE }}
      RUNTIME_SERVICE_ACCOUNT: super-mega-dev-team@supermega-468612.iam.gserviceaccount.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set active project
        run: gcloud config set project "$PROJECT_ID"

      - name: Configure Docker auth
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" \
            --build-arg VITE_BOOKING_URL="${{ vars.VITE_BOOKING_URL }}" \
            --build-arg VITE_POSTHOG_KEY="${{ secrets.VITE_POSTHOG_KEY }}" \
            --build-arg VITE_POSTHOG_HOST="${{ vars.VITE_POSTHOG_HOST }}" \
            --build-arg VITE_SENTRY_DSN="${{ vars.VITE_SENTRY_DSN }}" \
            --build-arg VITE_WORKSPACE_APP_BASE="${{ vars.VITE_WORKSPACE_APP_BASE }}" \
            --build-arg VITE_WORKSPACE_API_BASE="${{ vars.VITE_WORKSPACE_API_BASE }}" \
            -t "$IMAGE" .

      - name: Push image
        run: docker push "$IMAGE"

      - name: Deploy Cloud Run app
        run: |
          EXTRA_ARGS=""
          if [ -n "$CLOUDSQL_INSTANCE" ]; then
            EXTRA_ARGS="--add-cloudsql-instances $CLOUDSQL_INSTANCE"
          fi
          cat > cloudrun-env.yaml <<EOF
          SUPERMEGA_SITE_ROOT: /app/showroom/dist
          SUPERMEGA_PILOT_DATA: /app/pilot-data
          SUPERMEGA_ENV: production
          SUPERMEGA_AUTH_REQUIRED: "1"
          SUPERMEGA_APP_DISPLAY_NAME: "${{ vars.SUPERMEGA_APP_DISPLAY_NAME }}"
          SUPERMEGA_APP_ROLE: "${{ vars.SUPERMEGA_APP_ROLE }}"
          SUPERMEGA_WORKSPACE_SLUG: "${{ vars.SUPERMEGA_WORKSPACE_SLUG }}"
          SUPERMEGA_WORKSPACE_NAME: "${{ vars.SUPERMEGA_WORKSPACE_NAME }}"
          SUPERMEGA_WORKSPACE_PLAN: "${{ vars.SUPERMEGA_WORKSPACE_PLAN }}"
          SUPERMEGA_SESSION_HOURS: "${{ vars.SUPERMEGA_SESSION_HOURS }}"
          SUPERMEGA_CORS_ORIGINS: "${{ vars.SUPERMEGA_CORS_ORIGINS }}"
          SUPERMEGA_SENTRY_TRACES: "${{ vars.SUPERMEGA_SENTRY_TRACES }}"
          SENTRY_DSN: "${{ secrets.SENTRY_DSN }}"
          VITE_BOOKING_URL: "${{ vars.VITE_BOOKING_URL }}"
          VITE_POSTHOG_KEY: "${{ secrets.VITE_POSTHOG_KEY }}"
          VITE_POSTHOG_HOST: "${{ vars.VITE_POSTHOG_HOST }}"
          VITE_SENTRY_DSN: "${{ vars.VITE_SENTRY_DSN }}"
          VITE_WORKSPACE_APP_BASE: "${{ vars.VITE_WORKSPACE_APP_BASE }}"
          VITE_WORKSPACE_API_BASE: "${{ vars.VITE_WORKSPACE_API_BASE }}"
          RESEND_API_KEY: "${{ secrets.RESEND_API_KEY }}"
          STRIPE_SECRET_KEY: "${{ secrets.STRIPE_SECRET_KEY }}"
          STRIPE_WEBHOOK_SECRET: "${{ secrets.STRIPE_WEBHOOK_SECRET }}"
          EOF
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --env-vars-file cloudrun-env.yaml \
            --set-secrets "SUPERMEGA_APP_USERNAME=supermega-app-username:latest,SUPERMEGA_APP_PASSWORD=supermega-app-password:latest,SUPERMEGA_DATABASE_URL=supermega-database-url:latest,OPENAI_API_KEY=supermega-openai-api-key:latest,GOOGLE_MAPS_API_KEY=supermega-google-maps-api-key:latest,GOOGLE_PLACES_API_KEY=supermega-google-places-api-key:latest,GOOGLE_SERVICE_ACCOUNT_JSON=supermega-google-service-account-json:latest" \
            $EXTRA_ARGS

      - name: Print service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format='value(status.url)'
