name: Deploy SuperMega Showroom

on:
  push:
    branches:
      - main
      - 'copilot/**'
      - 'codex/**'
    paths:
      - 'showroom/**'
      - '.github/workflows/showroom-pages.yml'
      - 'CNAME'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: showroom-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: showroom/package-lock.json

      - name: Install dependencies
        working-directory: showroom
        run: npm ci

      - name: Preflight public env
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$VITE_GOOGLE_MAPS_API_KEY" ]; then
            echo "::warning title=Missing public search key::VITE_GOOGLE_MAPS_API_KEY is not set. Lead Finder will fall back to public map search on the live site."
          fi

      - name: Build showroom
        working-directory: showroom
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_BOOKING_URL: ${{ vars.VITE_BOOKING_URL }}
          VITE_WORKSPACE_APP_BASE: ${{ vars.VITE_WORKSPACE_APP_BASE }}
          VITE_WORKSPACE_API_BASE: ${{ vars.VITE_WORKSPACE_API_BASE }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Verify public routes
        run: |
          for route in find-companies company-list task-list lead-finder workspace action-os book; do
            test -f "showroom/dist/$route/index.html"
          done

      - name: Normalize CNAME encoding
        run: |
          python - <<'PY'
          from pathlib import Path
          raw = Path('CNAME').read_bytes()
          text = raw.decode('utf-8-sig', errors='ignore')
          if '\x00' in text:
              text = text.replace('\x00', '')
          Path('CNAME').write_text(text.strip() + '\n', encoding='utf-8')
          PY

      - name: Copy CNAME for custom domain
        run: cp CNAME showroom/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showroom/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
