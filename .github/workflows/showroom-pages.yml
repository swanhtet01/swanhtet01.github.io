name: Deploy SuperMega Showroom

on:
  push:
    branches:
      - main
      - 'copilot/**'
    paths:
      - 'showroom/**'
      - '.github/workflows/showroom-pages.yml'
      - 'CNAME'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: showroom-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: showroom/package-lock.json

      - name: Install dependencies
        working-directory: showroom
        run: npm ci

      - name: Build showroom
        working-directory: showroom
        run: npm run build

      - name: Copy CNAME for custom domain
        run: cp CNAME showroom/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: showroom/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
