name: SuperMega Domain Health

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run domain health checks
        run: python tools/check_supermega_domain.py --json-out domain_health.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: domain-health
          path: domain_health.json
