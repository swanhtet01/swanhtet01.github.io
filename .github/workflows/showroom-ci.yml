name: Showroom CI

# GitHub Actions billing is currently unavailable for this repo.
# CI now runs through Vercel/Codex release gates:
# powershell -ExecutionPolicy Bypass -File tools/run_vercel_release_gate.ps1 -Target all
on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: showroom/package-lock.json

      - name: Install dependencies
        working-directory: showroom
        run: npm ci

      - name: Guard public Vercel config
        run: npm run vercel:guard

      - name: Preflight public env
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -z "$VITE_GOOGLE_MAPS_API_KEY" ]; then
            echo "::warning title=Missing public search key::VITE_GOOGLE_MAPS_API_KEY is not set. Lead Finder will fall back to public map search during validation."
          fi

      - name: Lint
        working-directory: showroom
        run: npm run lint

      - name: Build
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_BOOKING_URL: ${{ vars.VITE_BOOKING_URL }}
          VITE_WORKSPACE_APP_BASE: ${{ vars.VITE_WORKSPACE_APP_BASE }}
          VITE_WORKSPACE_API_BASE: ${{ vars.VITE_WORKSPACE_API_BASE }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Verify public routes
        run: |
          for route in contact about products app/start app/portal; do
            test -f "api-static/$route/index.html"
          done
          test -f "api-static/index.html"
          test -f "api-static/social/supermega-contact-qr.png"

      - name: Verify public Vercel output
        run: |
          node tools/create_public_vercel_output.mjs
          node tools/verify_public_vercel_output.mjs
